<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recent History - Advanced Electrical Tools</title>
<style>

:root {
    --bg-primary: #3d5ca1; /* Updated background color */
    --panel-bg: none;
    --text-main: #ffffff;
    --text-muted: #ffffff;
    --accent-blue: #2563eb;
    --border-color: none;
    --radius-md: 8px;
    --radius-sm: 6px;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    
    /* Dynamic Theme Badges */
    --bg-calc: rgba(37, 99, 233, 0.1);
    --text-calc: #2563eb;
    --bg-conv: rgba(168, 85, 247, 0.1);
    --text-conv: #a855f7;
    --bg-res: rgba(234, 179, 8, 0.1);
    --text-res: #ca8a04;
    --bg-bat: rgba(16, 185, 129, 0.1);
    --text-bat: #10b981;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    background-color: var(--bg-primary);
    color: var(--text-main);
}

.history-container {
    max-width: 900px;
    margin: 0 auto;
}

.history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.history-header h2 {
    margin: 0;
    font-size: 22px;
    color: #ffffff; /* Adjusted header text color to white for better contrast against dark blue */
}

.clear-btn {
    background-color: #ef4444;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease;
}

.clear-btn:hover {
    background-color: #dc2626;
}

.date-group {
    margin-bottom: 25px;
}

.date-heading {
    font-size: 14px;
    font-weight: 700;
    color: #e2e8f0; /* Soft gray for high visibility on dark blue background */
    margin-bottom: 10px;
    padding-left: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.history-item {
    background-color: #7195e6;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow-sm);
}

.item-left {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.timestamp {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
}

.category-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}

.badge-calculator { background: var(--bg-calc); color: var(--text-calc); }
.badge-converter { background: var(--bg-conv); color: var(--text-conv); }
.badge-resistor { background: var(--bg-res); color: var(--text-res); }
.badge-battery { background: var(--bg-bat); color: var(--text-bat); }

.action-details {
    font-size: 14px;
    color: var(--text-main);
    font-weight: 500;
}

.item-right {
    text-align: right;
}

.result-display {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent-blue);
}

.no-logs-msg {
    background-color: var(--panel-bg);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: 30px;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow-sm);
}
</style>
</head>
<body>

<div class="history-container">
    <div class="history-header">
        <h2>Recent Action Logs</h2>
        <button class="clear-btn" onclick="clearLogs()">Clear Logs</button>
    </div>
    <div id="history_workspace"></div>
</div>

<script>
function loadHistory() {
    let container = document.getElementById("history_workspace");
    let logs = JSON.parse(localStorage.getItem('calc_history_logs')) || [];

    if (logs.length === 0) {
        container.innerHTML = `<div class="no-logs-msg">There were no calculations or conversions made in the last 3 days, or they've been deleted.</div>`;
        return;
    }

    let groups = {};
    logs.forEach(item => {
        let date = item.dateString || "History Timeline";
        if (!groups[date]) groups[date] = [];
        groups[date].push(item);
    });

    let html = "";
    for (let date in groups) {
        html += `<div class="date-group">`;
        html += `<div class="date-heading">${date}</div>`;
        html += `<div class="history-list">`;

        groups[date].forEach(item => {
            let lowerCat = item.category.toLowerCase();
            let badgeClass = "badge-calculator";
            if(lowerCat.includes("conv")) badgeClass = "badge-converter";
            if(lowerCat.includes("res")) badgeClass = "badge-resistor";
            if(lowerCat.includes("bat")) badgeClass = "badge-battery";

            html += `
                <div class="history-item">
                    <div class="item-left">
                        <span class="timestamp">${item.timestamp}</span>
                        <span class="category-badge ${badgeClass}">${item.category}</span>
                        <span class="action-details">${item.details}</span>
                    </div>
                    <div class="item-right">
                        <span class="result-display">${item.result}</span>
                    </div>
                </div>`;
        });
        html += `</div></div>`;
    }
    container.innerHTML = html;
}

function clearLogs() {
    if(confirm("Are you sure you want to clear your local history?")) {
        localStorage.removeItem('calc_history_logs');
        loadHistory();
    }
}

window.onfocus = function() {
    loadHistory();
};

window.onload = loadHistory;

window.addEventListener('storage', function(e) {
    if (e.key === 'calc_history_logs') {
        loadHistory();
    }
});
</script>
</body>
</html>
